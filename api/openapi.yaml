openapi: 3.0.3
info:
  title: Big Project API
  version: 0.1.0
  description: >
    API for the COP4331 "Free Food" project. Covers authentication (registration
    with email verification, JWT-based login, password reset and change) and the
    food posts feature: creating posts, a confidence-ranked live feed,
    one-vote-per-user voting, and presigned image uploads. All endpoints are
    served under the `/api` prefix.

servers:
  - url: http://localhost:5001/api
    description: Local development

tags:
  - name: Health
    description: Service liveness
  - name: Auth
    description: Registration, login, verification, and password management
  - name: Posts
    description: Food posts feed, voting, and image uploads
  - name: Locations
    description: Campus locations users pick from when posting
  - name: Users
    description: Reputation ("crumbs") and the weekly leaderboard

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service is up and the database is connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is up but the database is disconnected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      description: >
        Creates an unverified account and sends a verification email. The
        account cannot log in until the email is verified.
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created; verification email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Registered. Check your email to verify your account
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Email already in use

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive a JWT
      description: Returns a 24h JWT. Rejects unverified accounts with 403.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Invalid credentials
        '403':
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Email not verified

  /auth/verify:
    get:
      tags: [Auth]
      summary: Verify an email address
      description: >
        Consumes the token from the verification email (this URL is opened directly
        from the email client) and always responds with a 302 redirect to a page on
        the web app — never JSON or HTML rendered by the API itself.
      operationId: verifyEmail
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Raw verification token from the email link
      responses:
        '302':
          description: >
            Redirects to the web app (`APP_URL`). On success:
            `/email-verified?name=<displayName>`. On a missing, invalid, or expired
            token, or an unexpected server error: `/verify-email?error=invalid` or
            `/verify-email?error=server`.
          headers:
            Location:
              schema:
                type: string
              description: Destination URL on the web app

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend the verification email
      description: >
        Always returns 200 regardless of whether the email exists or is already
        verified, to avoid leaking which addresses are registered.
      operationId: resendVerification
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: Generic acknowledgement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: If that account exists and is unverified, a verification email has been sent.
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset email
      description: >
        Always returns 200 regardless of whether the email exists, to avoid
        leaking which addresses are registered. Reset tokens expire after 1 hour.
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: Generic acknowledgement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: If that account exists, a password reset email has been sent.
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using a token
      description: >
        Consumes the token from the reset email and sets a new password. This
        invalidates all existing sessions; the user must log in again.
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Password has been reset. You can now log in.
        '400':
          description: Missing fields, or invalid/expired reset token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Invalid or expired reset token

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password while logged in
      description: >
        Requires the current password. On success, all other sessions are
        invalidated and a fresh JWT is returned so the calling client stays
        logged in. Clients must replace their stored token with the returned one.
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed; new token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Current password incorrect, or missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Current password is incorrect
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: User not found

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the current user
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me/avatar-upload-url:
    get:
      tags: [Auth]
      summary: Get a presigned URL to upload a profile picture
      description: >
        Returns a short-lived presigned S3 PUT URL and its key. The client uploads
        the image (JPEG) directly to S3, then calls POST /auth/me/avatar to save it.
        The key is deterministic (avatars/{userId}.jpg), so re-uploads overwrite.
      operationId: getAvatarUploadUrl
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The presigned upload URL and key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Image uploads are not configured on the server

  /auth/me/avatar:
    post:
      tags: [Auth]
      summary: Save the uploaded profile picture
      description: >
        Marks the current user as having a profile picture (sets avatarKey). Call
        this after successfully uploading via the presigned URL. Idempotent.
      operationId: setAvatar
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /posts:
    get:
      tags: [Posts]
      summary: List the live feed
      description: >
        Returns active posts (those not yet expired), most-alive-first. Each post
        includes a freshly computed `confidence` and `status`. Public; no auth.
      operationId: getFeed
      security: []
      responses:
        '200':
          description: The current feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedResponse'
    post:
      tags: [Posts]
      summary: Create a food post
      description: >
        Creates a post seeded at a high starting confidence. If an image was
        uploaded via /posts/upload-url, pass the returned key as `imageKey`.
      operationId: createPost
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePostResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /posts/upload-url:
    get:
      tags: [Posts]
      summary: Get a presigned image upload URL
      description: >
        Returns a short-lived (120s) presigned S3 PUT URL and the object key. The
        client PUTs the image bytes directly to `url`, then creates the post with
        `imageKey` set to `key`. Image bytes never pass through this API.
      operationId: getUploadUrl
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A presigned upload URL and its key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Image uploads are not configured (no S3 bucket set)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Image uploads are not configured

  /posts/{id}/vote:
    post:
      tags: [Posts]
      summary: Vote on a post
      description: >
        Records a "still here" or "gone" vote. Each user may vote once per post.
        The vote shifts the post's confidence and may expire it immediately.
      operationId: votePost
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The post's id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteRequest'
      responses:
        '200':
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoteResponse'
        '400':
          description: Missing or invalid vote type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: type must be 'present' or 'gone'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: The caller is the post's author and may not vote on their own drop
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: You can't vote on your own drop
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Post not found
        '409':
          description: The user has already voted on this post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: You have already voted on this post

  /posts/{id}:
    delete:
      tags: [Posts]
      summary: Delete a post
      description: >
        Deletes a post and its votes. Only the post's author may delete it; the
        image is left to expire under the S3 lifecycle rule.
      operationId: deletePost
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The post's id
      responses:
        '204':
          description: Post deleted (no content)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: The post belongs to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: You can only delete your own posts
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Post not found

  /locations:
    get:
      tags: [Locations]
      summary: List campus locations
      description: >
        Returns the fixed set of campus locations users choose from when posting.
        Use each entry's `id` as the `location` when creating a post. Public; no auth.
      operationId: getLocations
      security: []
      responses:
        '200':
          description: The campus location list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationsResponse'

  /users/leaderboard:
    get:
      tags: [Users]
      summary: Weekly reputation leaderboard
      description: >
        Top earners over a rolling 7-day window, most points first, plus the
        caller's own weekly standing. Tier is derived from each user's lifetime
        reputation, not the weekly total.
      operationId: getLeaderboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The weekly leaderboard and the caller's standing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT issued by /auth/login or /auth/change-password. Send as
        `Authorization: Bearer <token>`. Tokens expire after 24h and are
        invalidated when the account's password changes.

  responses:
    ValidationError:
      description: A required field is missing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: email is required
    Unauthorized:
      description: Missing, invalid, or expired token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Invalid or expired token

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    HealthResponse:
      type: object
      required: [status, uptime, db]
      properties:
        status:
          type: string
          enum: [ok, degraded]
          description: '"ok" when the database is connected, "degraded" otherwise.'
          example: ok
        uptime:
          type: number
          description: Process uptime in seconds
          example: 12.34
        db:
          type: string
          enum: [connected, disconnected]
          example: connected

    User:
      type: object
      required: [id, displayName, email]
      properties:
        id:
          type: string
          example: 665f1c2e9b1e8a0012a3b4c5
        displayName:
          type: string
          description: The name shown for the user, e.g. in greetings and on posts.
          example: Maya
        email:
          type: string
          format: email
          example: user@example.com
        avatarKey:
          type: string
          description: >
            S3 object key for the profile picture, or absent if none uploaded.
            When absent, clients render a generated initials avatar.
          example: avatars/665f1c2e9b1e8a0012a3b4c5.jpg
        verified:
          type: boolean
          example: true
        reputation:
          type: integer
          description: >
            Lifetime "crumbs" the user has earned. Present on GET /auth/me.
          example: 120
        tier:
          type: integer
          minimum: 0
          maximum: 3
          description: >
            Trust tier derived from total reputation (0–3). Present on GET /auth/me.
          example: 1
        nextTierAt:
          type: integer
          nullable: true
          description: >
            Reputation needed to reach the next tier, or null at the top tier.
            Present on GET /auth/me.
          example: 150

    RegisterRequest:
      type: object
      required: [displayName, email, password]
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 100
          description: The name shown for the user, e.g. in greetings and on posts.
          example: Maya
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: hunter2

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: hunter2

    EmailRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          description: Raw reset token from the email link
        password:
          type: string
          format: password
          description: The new password

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: JWT, valid for 24h
        user:
          $ref: '#/components/schemas/User'

    ChangePasswordResponse:
      type: object
      required: [token, message]
      properties:
        token:
          type: string
          description: Fresh JWT that replaces the caller's now-invalidated token
        message:
          type: string

    MeResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'

    PostStatus:
      type: string
      enum: [fresh, likely, fading, gone]
      description: Confidence band. Posts at "gone" are excluded from the feed.

    PostType:
      type: string
      enum: [pizza, meal, snacks, baked-goods, drinks, other]
      description: What kind of food the post is; exactly one, required.
      example: pizza

    DietaryTag:
      type: string
      enum: [vegetarian, vegan, halal, kosher, gluten-free]

    Tallies:
      type: object
      required: [present, gone]
      properties:
        present:
          type: integer
          example: 3
        gone:
          type: integer
          example: 1

    Post:
      type: object
      required: [_id, foodName, type, dietaryTags, location, author, status, tallies, expiresAt, createdAt, updatedAt]
      description: >
        A food post. Internal fields (e.g. the raw log-odds `E` and `lastUpdate`)
        may also appear in responses but are not part of the stable contract.
      properties:
        _id:
          type: string
          description: >
            MongoDB document id. Note: post objects expose `_id` (raw Mongoose
            shape), whereas user objects expose `id` — use the right one per resource.
          example: 665f1c2e9b1e8a0012a3b4c5
        foodName:
          type: string
          example: Leftover Domino's
        type:
          $ref: '#/components/schemas/PostType'
        dietaryTags:
          type: array
          items:
            $ref: '#/components/schemas/DietaryTag'
          example: [vegetarian, halal]
        location:
          allOf:
            - $ref: '#/components/schemas/CampusLocation'
          description: >
            The campus location, resolved from the stored id to its full record
            (name + coordinates) on read.
        locationDetail:
          type: string
          description: Optional free-text spot within the location, e.g. a room or floor.
          example: 2nd floor lounge
        imageKey:
          type: string
          description: S3 object key; the client builds the display URL from this.
          example: posts/9661e87f-3b2c-4199-a797-4d91e7306955.jpg
        author:
          type: string
          description: Id of the user who posted it
          example: 665f1c2e9b1e8a0012a3b4c5
        authorName:
          type: string
          description: >
            Display name of the author, resolved on read. Optional; absent only if
            the author record is unavailable.
          example: Maya
        authorAvatarKey:
          type: string
          description: >
            S3 object key for the author's avatar, when they have one set. The
            client builds the display URL from this, same as imageKey.
          example: avatars/665f1c2e9b1e8a0012a3b4c5.jpg
        authorTier:
          type: integer
          minimum: 0
          maximum: 3
          description: >
            The author's trust tier (0–3), derived on read from their reputation.
            A higher tier seeds the post at a higher starting confidence.
          example: 2
        status:
          $ref: '#/components/schemas/PostStatus'
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: >
            Live probability the food is still there (0–1). Computed on read, so
            it is present on feed responses.
          example: 0.88
        tallies:
          $ref: '#/components/schemas/Tallies'
        expiresAt:
          type: string
          format: date-time
          description: When the post will decay past the "gone" threshold.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatePostRequest:
      type: object
      required: [foodName, type, location]
      properties:
        foodName:
          type: string
          example: Leftover Domino's
        type:
          $ref: '#/components/schemas/PostType'
        dietaryTags:
          type: array
          items:
            $ref: '#/components/schemas/DietaryTag'
          description: Optional; defaults to an empty array. Unknown values are rejected with 400.
          example: [vegetarian, halal]
        location:
          type: string
          description: >
            Id of a campus location from GET /locations. Must match a known id;
            arbitrary strings are rejected with 400.
          example: student-union
        locationDetail:
          type: string
          maxLength: 256
          description: Optional free-text spot within the location, e.g. a room or floor.
          example: 2nd floor lounge
        imageKey:
          type: string
          description: Key from /posts/upload-url, if an image was uploaded.

    CreatePostResponse:
      type: object
      required: [post]
      properties:
        post:
          $ref: '#/components/schemas/Post'

    FeedResponse:
      type: object
      required: [posts]
      properties:
        posts:
          type: array
          items:
            $ref: '#/components/schemas/Post'

    CampusLocation:
      type: object
      required: [id, name, latitude, longitude]
      properties:
        id:
          type: string
          description: Stable slug id; the value stored on a post and sent when creating one.
          example: student-union
        name:
          type: string
          example: Student Union
        latitude:
          type: number
          format: double
          example: 28.6019
        longitude:
          type: number
          format: double
          example: -81.2005

    LocationsResponse:
      type: object
      required: [locations]
      properties:
        locations:
          type: array
          items:
            $ref: '#/components/schemas/CampusLocation'

    VoteRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [present, gone]
          description: '"present" = still here, "gone" = not there anymore'

    VoteResponse:
      type: object
      required: [confidence, status, tallies]
      properties:
        confidence:
          type: number
          format: float
          example: 0.27
        status:
          $ref: '#/components/schemas/PostStatus'
        tallies:
          $ref: '#/components/schemas/Tallies'

    LeaderboardEntry:
      type: object
      required: [userId, weeklyPoints, tier, rank]
      properties:
        userId:
          type: string
          example: 665f1c2e9b1e8a0012a3b4c5
        displayName:
          type: string
          description: Absent only if the user record is unavailable.
          example: Maya
        avatarKey:
          type: string
          description: S3 object key for the user's avatar, when set.
          example: avatars/665f1c2e9b1e8a0012a3b4c5.jpg
        weeklyPoints:
          type: integer
          description: Reputation earned in the last 7 days.
          example: 42
        tier:
          type: integer
          minimum: 0
          maximum: 3
          description: Trust tier from the user's lifetime reputation.
          example: 2
        rank:
          type: integer
          description: 1-based rank; ties share a rank.
          example: 1

    LeaderboardResponse:
      type: object
      required: [entries, me]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardEntry'
        me:
          type: object
          required: [rank, weeklyPoints, reputation, tier]
          properties:
            rank:
              type: integer
              nullable: true
              description: The caller's rank, or null if they earned nothing this week.
              example: 5
            weeklyPoints:
              type: integer
              example: 12
            reputation:
              type: integer
              description: The caller's lifetime reputation.
              example: 120
            tier:
              type: integer
              minimum: 0
              maximum: 3
              example: 1

    UploadUrlResponse:
      type: object
      required: [url, key]
      properties:
        url:
          type: string
          format: uri
          description: Presigned S3 PUT URL, valid for 120 seconds.
        key:
          type: string
          example: posts/9661e87f-3b2c-4199-a797-4d91e7306955.jpg
